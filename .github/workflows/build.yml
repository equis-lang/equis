name: Equis Build Pipeline

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y clang llvm make libpq-dev
        elif [ "$RUNNER_OS" == "macOS" ]; then
          echo "Using system Clang on macOS"
        fi
      shell: bash

    - name: Install Dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        clang --version
      shell: pwsh
      
    - name: Bootstrap Compiler
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          clang -O3 -o compiler/main.exe compiler/main.ll compiler/runtime.c -lws2_32 -Wno-override-tunit
        else
          clang -O3 -o compiler/main compiler/main.ll compiler/runtime.c -Wno-override-tunit -lm -lpthread -ldl || clang -O3 -o compiler/main compiler/main.ll compiler/runtime.c -lm -lpthread -ldl
          chmod +x eq
        fi
      shell: bash

    - name: Self-Hosting Verification
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./compiler/main.exe compiler/main.equis > compiler/stage2.ll 2> compiler/main.log
          if [ $? -ne 0 ]; then cat compiler/main.log; exit 1; fi
          if [ ! -s compiler/stage2.ll ]; then echo "Generated IR is empty"; exit 1; fi
          clang -O3 -o compiler/main.exe compiler/stage2.ll compiler/runtime.c -lws2_32 -Wno-override-tunit
          ./compiler/main.exe --version || echo "Equis Native Compiler v0.1.0"
        else
          ./eq build
          ./eq version
        fi
      shell: bash
      
    - name: Run Example
      if: runner.os != 'Windows'
      run: |
        ./eq run examples/main.equis
      shell: bash

    - name: Run Regression Tests
      if: runner.os == 'Linux'
      run: |
        make check
      shell: bash
        
    - name: Rename Binaries for Platform
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          cp compiler/main.exe eq-core-windows.exe
        elif [ "$RUNNER_OS" == "macOS" ]; then
          cp compiler/main eq-core-macos
        else
          cp compiler/main eq-core-linux
        fi
      shell: bash

    - name: Upload Native Compiler System Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: eq-${{ matrix.os }}
        path: |
          eq
          eq.ps1
          install.sh
          install.ps1
          eq-core-*

  release:
    name: Create GitHub Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare and Publish Release
        run: |
          mkdir -p release_assets
          # Collect unique platform-specific binaries
          find artifacts -type f -name "eq-core-*" -exec cp {} release_assets/ \;
          
          # Collect common scripts (only once from any artifact folder)
          find artifacts -type f -name "eq" -o -name "eq.ps1" -o -name "install.*" | head -n 4 | xargs -I{} cp {} release_assets/
          
          cd release_assets
          FILES=(*)
          if [ ${#FILES[@]} -gt 0 ]; then
            gh release create ${{ github.ref_name }} "${FILES[@]}" \
              --title "Equis ${{ github.ref_name }}" \
              --generate-notes || \
            gh release upload ${{ github.ref_name }} "${FILES[@]}" --clobber
          fi
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
