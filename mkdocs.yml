site_name: Equis Language
site_url: https://equis-lang.github.io/equis
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - search.highlight

nav:
  - Home: README.md
  - Language Overview: EQUIS.md
  - Core Documentation:
      - Architecture: docs/architecture.md
      - Language Specification: docs/specification.md
      - Operational Semantics: docs/operational_semantics.md
      - Grammar (EBNF): docs/grammar.md
  - Reference:
      - Standard Library: docs/stdlib_reference.md
      - Integration Guide: docs/integration_guide.md
      - Benchmarks: docs/benchmarks.md
  - Community & Legal:
      - Contributing: CONTRIBUTING.md
      - Code of Conduct: CODE_OF_CONDUCT.md
      - Security Policy: SECURITY.md
      - Changelog: CHANGELOG.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables

copyright: "Copyright &copy; 2026 mlintangmz"
